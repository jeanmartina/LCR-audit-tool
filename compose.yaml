services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      AUTH_PUBLIC_ORIGIN: ${AUTH_PUBLIC_ORIGIN}
      NEXT_PUBLIC_APP_ORIGIN: ${NEXT_PUBLIC_APP_ORIGIN}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AUTH_GOOGLE_CLIENT_ID: ${AUTH_GOOGLE_CLIENT_ID:-}
      AUTH_GOOGLE_CLIENT_SECRET: ${AUTH_GOOGLE_CLIENT_SECRET:-}
      AUTH_ENTRA_CLIENT_ID: ${AUTH_ENTRA_CLIENT_ID:-}
      AUTH_ENTRA_CLIENT_SECRET: ${AUTH_ENTRA_CLIENT_SECRET:-}
      AUTH_ENTRA_TENANT_ID: ${AUTH_ENTRA_TENANT_ID:-}
      AUTH_OIDC_CLIENT_ID: ${AUTH_OIDC_CLIENT_ID:-}
      AUTH_OIDC_CLIENT_SECRET: ${AUTH_OIDC_CLIENT_SECRET:-}
      AUTH_OIDC_ISSUER: ${AUTH_OIDC_ISSUER:-}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-}
      CERT_IMPORT_MAX_CERTIFICATE_BYTES: ${CERT_IMPORT_MAX_CERTIFICATE_BYTES:-524288}
      CERT_IMPORT_MAX_ARCHIVE_BYTES: ${CERT_IMPORT_MAX_ARCHIVE_BYTES:-10485760}
      CERT_IMPORT_MAX_UNCOMPRESSED_BYTES: ${CERT_IMPORT_MAX_UNCOMPRESSED_BYTES:-52428800}
      CERT_IMPORT_MAX_FILES: ${CERT_IMPORT_MAX_FILES:-500}
      TRUST_LIST_FETCH_TIMEOUT_MS: ${TRUST_LIST_FETCH_TIMEOUT_MS:-30000}
      TRUST_LIST_MAX_XML_BYTES: ${TRUST_LIST_MAX_XML_BYTES:-26214400}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["npm", "run", "start:worker"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      WORKER_LOOP_INTERVAL_MS: ${WORKER_LOOP_INTERVAL_MS:-60000}
      CERT_IMPORT_MAX_CERTIFICATE_BYTES: ${CERT_IMPORT_MAX_CERTIFICATE_BYTES:-524288}
      CERT_IMPORT_MAX_ARCHIVE_BYTES: ${CERT_IMPORT_MAX_ARCHIVE_BYTES:-10485760}
      CERT_IMPORT_MAX_UNCOMPRESSED_BYTES: ${CERT_IMPORT_MAX_UNCOMPRESSED_BYTES:-52428800}
      CERT_IMPORT_MAX_FILES: ${CERT_IMPORT_MAX_FILES:-500}
      TRUST_LIST_FETCH_TIMEOUT_MS: ${TRUST_LIST_FETCH_TIMEOUT_MS:-30000}
      TRUST_LIST_MAX_XML_BYTES: ${TRUST_LIST_MAX_XML_BYTES:-26214400}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  caddy:
    image: caddy:2
    depends_on:
      - web
    environment:
      APP_HOST: ${APP_HOST}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
